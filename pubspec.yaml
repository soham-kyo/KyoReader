name: kyoreader
description: KyoReader – Universal File Reader. A fast, offline-first file reader for Android.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2

  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  open_filex: ^4.5.0
  archive: ^3.6.1

  syncfusion_flutter_pdfviewer: ^27.1.48
  syncfusion_flutter_core: ^27.1.48

  shared_preferences: ^2.3.3

  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6+2
  in_app_purchase_storekit: ^0.3.17+2

  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  mime: ^2.0.0
  intl: ^0.19.0
  crypto: ^3.0.3
  permission_handler: ^11.3.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: false
  image_path: "android/app/src/main/res/mipmap-hdpi/ic_launcher.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "android/app/src/main/res/mipmap-hdpi/ic_launcher.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - android/app/src/main/res/mipmap-hdpi/ic_launcher.png
